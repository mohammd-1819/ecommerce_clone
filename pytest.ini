[pytest]
DJANGO_SETTINGS_MODULE = new_danidor.test_settings
python_files = tests.py test_*.py *_tests.py
testpaths =
    product/tests
    cart/tests
    order/tests
pythonpath = .
addopts =
    -ra
    --strict-markers
    --reuse-db
    --import-mode=importlib
markers =
    django_db: mark test as requiring database access